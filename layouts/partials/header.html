<header class="site-header">
  <div class="header-inner">
    <a class="brand" href="{{ "/" | relURL }}">
      <span class="brand-mark">PC</span>
      <span class="brand-name">{{ .Site.Title }}</span>
    </a>
    <nav class="site-nav">
      <ul>
        {{ range .Site.Menus.main }}
        <li><a href="{{ .URL | relURL }}">{{ .Name }}</a></li>
        {{ end }}
      </ul>
    </nav>
  </div>
</header>
