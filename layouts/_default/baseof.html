<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode | default "en" }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} — {{ .Site.Title }}{{ end }}</title>
  <meta name="description" content="{{ .Description | default .Site.Params.description }}">
  <link rel="stylesheet" href="{{ "css/style.css" | relURL }}">
  <link rel="icon" href="{{ "images/favicon.png" | relURL }}">
  <meta name="theme-color" content="{{ .Site.Params.brandColor }}">
  <script defer src="{{ "js/pokedex.js" | relURL }}"></script>
  <script type="importmap">
  {
    "imports": {
      "three":      "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>
  <script type="module" src="{{ "js/mc-model-viewer.js" | relURL }}"></script>
</head>
<body>
  {{ partial "header.html" . }}
  <div class="layout">
    <aside class="sidebar">{{ partial "sidebar.html" . }}</aside>
    <main class="content">
      {{ block "main" . }}{{ end }}
    </main>
  </div>
  {{ partial "footer.html" . }}
</body>
</html>
