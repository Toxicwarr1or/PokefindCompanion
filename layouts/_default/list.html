{{ define "main" }}
<section class="page">
  <header class="page-header">
    <h1>{{ .Title }}</h1>
    {{ with .Params.subtitle }}<p class="subtitle">{{ . }}</p>{{ end }}
  </header>
  <div class="prose">
    {{ .Content }}
  </div>
  {{ if .Pages }}
  <ul class="page-index">
    {{ range .Pages.ByTitle }}
    <li><a href="{{ .RelPermalink }}"><strong>{{ .Title }}</strong>{{ with .Params.subtitle }} — <span>{{ . }}</span>{{ end }}</a></li>
    {{ end }}
  </ul>
  {{ end }}
</section>
{{ end }}
