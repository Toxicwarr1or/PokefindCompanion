{{ define "main" }}
<section class="hero">
  <h1>{{ .Site.Title }}</h1>
  <p class="hero-tagline">{{ .Site.Params.description }}</p>
  <p class="hero-cta">
    <a class="btn" href="{{ "pokedex/" | relURL }}">Pokedex</a>
    <a class="btn" href="{{ "quests/" | relURL }}">Quests</a>
    <a class="btn" href="{{ .Site.Params.youtube }}" target="_blank" rel="noopener">YouTube channel</a>
  </p>
</section>
<section class="prose">
  {{ .Content }}
</section>
<section class="cards">
  {{ range .Site.Menus.main }}
  <a class="card" href="{{ .URL | relURL }}">
    <h3>{{ .Name }}</h3>
  </a>
  {{ end }}
</section>
{{ end }}
