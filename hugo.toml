baseURL = "https://pokefindcompanion.pages.dev/"
languageCode = "en-us"
title = "Pokéfind Companion"

# Pretty URLs
canonifyURLs = false
relativeURLs = false

# Don't generate noisy default pages we don't want
disableKinds = ["taxonomy", "term"]

[params]
  description = "An editorially curated Pokéfind reference, paired with the WarriorToxic YouTube channel."
  author = "WarriorToxic"
  youtube = "https://www.youtube.com/@WarriorToxic"
  brandColor = "#3eb045"

# Top-nav menu
[[menu.main]]
  name = "Pokéfind"
  url = "/pokefind/"
  weight = 5

[[menu.main]]
  name = "Pokédex"
  url = "/pokedex/"
  weight = 10

[[menu.main]]
  name = "Guides"
  url = "/guides/"
  weight = 20

[[menu.main]]
  name = "Mechanics"
  url = "/mechanics/"
  weight = 40

[[menu.main]]
  name = "Games"
  url = "/games/"
  weight = 45

[[menu.main]]
  name = "Suggestions"
  url = "/suggestions/"
  weight = 50
# "Skins" used to live here as a top-level entry; it's now reachable via
# the "Skindex" link inside the Pokédex group sidebar (see partials/sidebar.html).
# "Quests" and "Gym Teams" were also top-level entries; they now sit under
# the Guides group sidebar (see partials/sidebar.html). Their URL paths
# (/quests/ and /gym-teams/) are unchanged so existing links still resolve.

# Markdown rendering
[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true   # allow raw HTML in markdown — we control the content
  [markup.tableOfContents]
    startLevel = 2
    endLevel   = 4

# Build hardening
[outputs]
  home    = ["HTML", "RSS", "MOVETIPS", "CALCDATA", "SEARCHINDEX"]
  section = ["HTML", "RSS", "ENTRY"]
  page    = ["HTML", "ENTRY"]

[outputFormats.MOVETIPS]
  mediaType   = "application/json"
  baseName    = "movetips"
  isPlainText = true
  notAlternative = true

[outputFormats.CALCDATA]
  mediaType   = "application/json"
  baseName    = "calcdata"
  isPlainText = true
  notAlternative = true

# Mobile-app data feeds (consumed by the Pokéfind Companion app)
[outputFormats.SEARCHINDEX]
  mediaType   = "application/json"
  baseName    = "search-index"
  isPlainText = true
  notAlternative = true

[outputFormats.ENTRY]
  mediaType   = "application/json"
  baseName    = "entry"
  isPlainText = true
  notAlternative = true
