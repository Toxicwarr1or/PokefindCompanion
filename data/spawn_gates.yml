# Per-gen wild-spawn gates, parsed from the S3 spawn_rates_<n>.xls
# files (see SpawnManager.java#retrieveSpawnRates). Keyed by gen, then
# by species name. trainer_level = lowest trainerLevel gate across all
# territories the species spawns in (the earliest it becomes
# encounterable in that region). min_level / max_level = observed
# spawn-level range. 0/null fields mean unset.
#
# Regenerate via /tmp/build_spawn_gates.py (downloads the XLS, converts
# via libreoffice, parses).
